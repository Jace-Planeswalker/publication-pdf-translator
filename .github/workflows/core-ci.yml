name: m0-v2-core

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: >-
          ruff check
          src/pubtrans/m0v2
          src/pubtrans/cli.py
          tests/m0v2_helpers.py
          tests/test_cli.py
          tests/test_m0v2_contract.py
          tests/test_m0v2_store.py
      - run: >-
          python -m pytest -q
          tests/test_cli.py
          tests/test_m0v2_contract.py
          tests/test_m0v2_store.py
