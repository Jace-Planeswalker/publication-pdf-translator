name: core-contracts

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: ruff check src tests
      - run: >-
          python -m pytest -q
          tests/test_cli.py
          tests/test_m0v2_contract.py
          tests/test_m0v2_store.py
          tests/test_m1_plan_workflow.py
          tests/test_m1_store_kernel.py
          tests/test_m1_terminology.py
          tests/test_m2_recovery.py
          tests/test_m5_openai_and_marking.py
          tests/test_m5_planner.py
          tests/test_m5_services.py
