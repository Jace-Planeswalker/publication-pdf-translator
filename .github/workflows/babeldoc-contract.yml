name: babeldoc-m0-v2-contract

on:
  push:
  pull_request:

jobs:
  adapter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[babeldoc,dev]'
      - run: ruff check .
      - run: >-
          python -m pytest -q
          tests/test_babeldoc_adapter.py
          tests/test_babeldoc_pipeline_v2.py
