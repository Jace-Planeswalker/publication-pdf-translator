name: babeldoc-contract

on:
  push:
  pull_request:

jobs:
  adapter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[babeldoc,dev]'
      - run: ruff check src tests
      - run: python -m pytest tests/test_babeldoc_adapter.py
